<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>IPA安装器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: #1c1c1e;
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #007aff, #5856d6);
            border-radius: 20px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            color: #8e8e93;
        }

        .upload-area {
            background: #2c2c2e;
            border: 2px dashed #48484a;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:active {
            transform: scale(0.98);
            background: #3a3a3c;
        }

        .upload-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .upload-text {
            font-size: 16px;
            color: #8e8e93;
        }

        .file-info {
            background: #2c2c2e;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }

        .file-name {
            font-size: 14px;
            word-break: break-all;
            margin-bottom: 5px;
        }

        .file-size {
            font-size: 12px;
            color: #8e8e93;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: #007aff;
            color: #fff;
        }

        .btn-success {
            background: #34c759;
            color: #fff;
            display: none;
        }

        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .progress {
            width: 100%;
            height: 4px;
            background: #48484a;
            border-radius: 2px;
            margin: 15px 0;
            display: none;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #007aff;
            border-radius: 2px;
            transition: width 0.3s;
            width: 0%;
        }

        .guide {
            background: #2c2c2e;
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }

        .guide-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #8e8e93;
        }

        .step-num {
            background: #007aff;
            color: #fff;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 999;
            display: none;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">📱</div>
            <div class="title">IPA 安装器</div>
            <div class="subtitle">支持所有 iOS 版本 · 包括 iOS 18</div>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📂</div>
            <div class="upload-text">点击选择 IPA 文件</div>
        </div>

        <input type="file" id="fileInput" accept=".ipa">

        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>

        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <button class="btn btn-primary" id="uploadBtn" disabled>
            上传文件
        </button>

        <button class="btn btn-success" id="installBtn">
            📥 下载并安装
        </button>

        <div class="guide">
            <div class="guide-title">📋 安装说明（全系统通用）</div>
            <div class="step">
                <span class="step-num">1</span>
                <span>选择并上传您的 IPA 文件</span>
            </div>
            <div class="step">
                <span class="step-num">2</span>
                <span>点击"下载并安装"按钮</span>
            </div>
            <div class="step">
                <span class="step-num">3</span>
                <span>在弹出的对话框中点击"安装"</span>
            </div>
            <div class="step">
                <span class="step-num">4</span>
                <span>前往 设置 > 通用 > VPN与设备管理</span>
            </div>
            <div class="step">
                <span class="step-num">5</span>
                <span>信任企业证书即可使用</span>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const uploadBtn = document.getElementById('uploadBtn');
        const installBtn = document.getElementById('installBtn');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const toast = document.getElementById('toast');

        let selectedFile = null;
        let downloadUrl = '';

        // 点击上传区域
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (!file.name.toLowerCase().endsWith('.ipa')) {
                    showToast('❌ 请选择IPA文件');
                    return;
                }
                selectedFile = file;
                fileName.textContent = file.name;
                fileSize.textContent = formatSize(file.size);
                fileInfo.style.display = 'block';
                uploadBtn.disabled = false;
                installBtn.style.display = 'none';
            }
        });

        // 上传按钮
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            uploadBtn.disabled = true;
            uploadBtn.textContent = '上传中...';
            progress.style.display = 'block';
            progressBar.style.width = '0%';

            const formData = new FormData();
            formData.append('ipa', selectedFile);

            try {
                const xhr = new XMLHttpRequest();
                
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percent = (e.loaded / e.total) * 100;
                        progressBar.style.width = percent + '%';
                    }
                });

                xhr.addEventListener('load', () => {
                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        if (response.success) {
                            downloadUrl = `/download/${response.fileId}`;
                            uploadBtn.style.display = 'none';
                            installBtn.style.display = 'block';
                            showToast('✅ 上传成功！点击下方按钮安装');
                        } else {
                            showToast('❌ ' + response.message);
                        }
                    } else {
                        showToast('❌ 上传失败');
                    }
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = '上传文件';
                    setTimeout(() => {
                        progress.style.display = 'none';
                        progressBar.style.width = '0%';
                    }, 1000);
                });

                xhr.addEventListener('error', () => {
                    showToast('❌ 网络错误');
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = '上传文件';
                    progress.style.display = 'none';
                });

                xhr.open('POST', '/upload');
                xhr.send(formData);
            } catch (error) {
                showToast('❌ 上传失败');
                uploadBtn.disabled = false;
                uploadBtn.textContent = '上传文件';
                progress.style.display = 'none';
            }
        });

        // 安装按钮（兼容所有iOS版本）
        installBtn.addEventListener('click', () => {
            if (!downloadUrl) return;

            // 对于iOS设备，使用itms-services协议可以直接触发安装
            const userAgent = navigator.userAgent;
            const isIOS = /iPhone|iPad|iPod/.test(userAgent);
            
            if (isIOS) {
                // 直接下载IPA文件，iOS会自动识别
                window.location.href = downloadUrl;
                showToast('📥 正在下载，请在弹出窗口点击"安装"');
                
                // 3秒后提示信任证书
                setTimeout(() => {
                    showToast('💡 下载完成后请前往设置信任证书');
                }, 3000);
            } else {
                // 非iOS设备直接下载
                window.location.href = downloadUrl;
                showToast('📥 开始下载IPA文件');
            }
        });

        // 拖拽支持
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#007aff';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#48484a';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#48484a';
            
            const file = e.dataTransfer.files[0];
            if (file && file.name.toLowerCase().endsWith('.ipa')) {
                selectedFile = file;
                fileName.textContent = file.name;
                fileSize.textContent = formatSize(file.size);
                fileInfo.style.display = 'block';
                uploadBtn.disabled = false;
                installBtn.style.display = 'none';
            }
        });

        function showToast(message) {
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }
    </script>
</body>
</html>
